id: apptainer-gnome@1.0
version: "1.0"
description: GNOME desktop environment packaged for rootless Apptainer
observation:
  - type: rgb_screen
    fps: 8
    resolution: [1280, 720]
  - type: audio_waveform
    sample_rate: 16000
    channels: 1
action:
  - type: mouse
  - type: keyboard
apptainer:
  sif: "examples/apptainer_gnome_env/gnome-desktop.sif"
  fakeroot: true
  contain: true
  writable_tmpfs: true
  env:
    HOME: /workspace/home/ga
    USER: ga
resources:
  cpu: 4
  mem_gb: 8
  net: false
mounts:
  - source: "examples/apptainer_gnome_env/start_gnome.sh"
    target: "/workspace/start_gnome.sh"
    mode: ro
entrypoint: "/workspace/start_gnome.sh"
recording:
  enable: true
  output_dir: "./artifacts"
  video_fps: 8
  video_resolution: [1280, 720]
vnc:
  enable: true
  host_port: 5951
  view_only: true
user_accounts:
  - name: ga
    role: developer
    permissions:
      sudo: true
      sudo_nopasswd: true
      groups: ["audio", "video"]
      home_dir: /workspace/home/ga
